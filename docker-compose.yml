# GloveBox — full local stack: Next.js app + Postgres(pgvector) + Inngest dev.
# Quickstart:  cp .env.example .env  (fill the 4 required keys)  &&  docker compose up
services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: glovebox
      POSTGRES_PASSWORD: glovebox
      POSTGRES_DB: glovebox
    ports:
      - "5432:5432"
    volumes:
      - glovebox_pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U glovebox -d glovebox"]
      interval: 3s
      timeout: 3s
      retries: 30

  app:
    build: .
    environment:
      DATABASE_URL: postgresql://glovebox:glovebox@postgres:5432/glovebox
      AUTH_URL: ${AUTH_URL:-http://localhost:3000}
      AUTH_SECRET: ${AUTH_SECRET:-dev-insecure-change-me-0000000000000000000000}
      EMAIL_FROM: ${EMAIL_FROM:-GloveBox <login@glovebox.local>}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      LLM_MODEL: ${LLM_MODEL:-claude-sonnet-4-6}
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-text-embedding-3-small}
      INNGEST_DEV: "1"
      INNGEST_BASE_URL: http://inngest:8288
      NODE_ENV: production
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
    # Apply migrations + seed curated data, then serve.
    command: sh -c "pnpm db:migrate && pnpm db:seed && pnpm start"

  inngest:
    image: inngest/inngest:latest
    command: inngest dev -u http://app:3000/api/inngest
    ports:
      - "8288:8288"
    depends_on:
      - app

volumes:
  glovebox_pg:
